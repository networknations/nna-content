name: Notify Cloudflare Pages to Rebuild

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild for nna-site
        run: |
          curl -X POST \
            https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/2203a81c-a540-4776-8e80-fd61012d8689
