name: Notify Site to Rebuild

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SITE_REPO_TOKEN }}" \
            https://api.github.com/repos/${{ vars.SITE_REPO }}/dispatches \
            -d '{"event_type":"content-updated"}'
